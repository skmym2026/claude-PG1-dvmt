name: Python Tests

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: Verify module imports
        run: |
          python -c "
          import cwh_data_fetcher
          import cwh_screener
          import cwh_pattern_analyzer
          import cwh_trade_rules
          import cwh_backtest_engine
          import cwh_performance_metrics
          import cwh_realtime_monitor
          import cwh_growth_market_screener
          import cwh_chart_generator
          import cwh_sbi_order_generator
          import cwh_v30_main
          print('All modules imported successfully')
          "
